<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Management</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 24px;
            color: #333;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        h1::before { content: '🎓'; font-size: 1.8rem; }

        h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 16px;
        }

        /* Card */
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.10), 0 1.5px 4px rgba(0,0,0,0.06);
            padding: 24px;
            margin-bottom: 24px;
            transition: box-shadow 0.2s;
        }
        .card:hover { box-shadow: 0 8px 28px rgba(0,0,0,0.13), 0 2px 6px rgba(0,0,0,0.08); }

        /* Stats row */
        .stats-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .stat-card {
            flex: 1;
            min-width: 160px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border-radius: 12px;
            padding: 20px 24px;
            box-shadow: 0 4px 16px rgba(102,126,234,0.35);
        }
        .stat-card:nth-child(2) { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); box-shadow: 0 4px 16px rgba(245,87,108,0.35); }
        .stat-card:nth-child(3) { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); box-shadow: 0 4px 16px rgba(0,242,254,0.35); }

        .stat-card .label { font-size: 0.8rem; opacity: 0.85; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card .value { font-size: 1.8rem; font-weight: 700; margin-top: 4px; }

        /* Export button */
        .btn { 
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 18px; border: none; border-radius: 8px;
            cursor: pointer; font-size: 0.9rem; font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary { background: #667eea; color: #fff; }
        .btn-primary:hover { background: #5a6fd6; box-shadow: 0 4px 12px rgba(102,126,234,0.4); transform: translateY(-1px); }
        .btn-secondary { background: #f0f2f5; color: #555; }
        .btn-secondary:hover { background: #e2e6ea; }
        .btn-success { background: #48bb78; color: #fff; }
        .btn-success:hover { background: #38a169; box-shadow: 0 4px 12px rgba(72,187,120,0.4); transform: translateY(-1px); }
        .btn-warning { background: #ed8936; color: #fff; font-size: 0.8rem; padding: 5px 12px; }
        .btn-warning:hover { background: #dd6b20; }
        .btn-danger { background: #fc5c7d; color: #fff; font-size: 0.8rem; padding: 5px 12px; }
        .btn-danger:hover { background: #e53e3e; }

        /* Search bar */
        .search-bar {
            display: flex; gap: 10px; align-items: center; margin-bottom: 16px;
        }
        .search-bar input {
            flex: 1; padding: 10px 14px; border: 1.5px solid #ddd;
            border-radius: 8px; font-size: 0.95rem; outline: none;
            transition: border-color 0.2s;
        }
        .search-bar input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.13); }

        /* Table */
        table { border-collapse: collapse; width: 100%; }
        thead tr { background: linear-gradient(90deg, #667eea, #764ba2); color: #fff; }
        th { padding: 12px 14px; text-align: left; font-weight: 600; font-size: 0.88rem; letter-spacing: 0.3px; }
        td { padding: 11px 14px; font-size: 0.92rem; border-bottom: 1px solid #f0f2f5; }
        tbody tr:hover { background: #f7f8ff; }
        tbody tr:last-child td { border-bottom: none; }

        .badge {
            display: inline-block; padding: 2px 10px; border-radius: 20px;
            font-size: 0.78rem; font-weight: 600; background: #e9ecff; color: #667eea;
        }

        /* Form */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

        .form-group label {
            display: block; font-size: 0.82rem; font-weight: 600;
            color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px;
        }
        .form-group input, .form-group select {
            width: 100%; padding: 10px 13px; border: 1.5px solid #ddd;
            border-radius: 8px; font-size: 0.95rem; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fafafa;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #667eea; background: #fff;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.13);
        }
        .form-group input:disabled { background: #f0f2f5; cursor: not-allowed; color: #999; }

        .form-actions { display: flex; gap: 10px; margin-top: 6px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" src="app.js"></script>
</body>
</html>
